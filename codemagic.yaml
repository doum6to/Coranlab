# Cloud build & publish for the iOS app — NO Mac required.
# Codemagic runs this on its own macOS machines: it generates the native iOS
# project from Capacitor, signs it with your Apple credentials, and uploads it
# to App Store Connect / TestFlight.
#
# Before the first run (see docs/ios-app-store.md):
#   - Add an "App Store Connect" integration (API key, App Manager role) in the
#     Codemagic UI, named exactly as referenced below (codemagic_asc_api_key).
# Code signing is fully automatic via the scripts below (fetch-signing-files
# --create): the certificate + app_store profile are created on the first run.
# Nothing else to toggle in the UI.
workflows:
  ios-capacitor:
    name: iOS — Quranlab (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_asc_api_key # name of the API key added in Codemagic
    environment:
      vars:
        BUNDLE_ID: "app.quranlab"
        CAPACITOR_SERVER_URL: "https://www.quranlab.app" # your live site (canonical host)
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # APP_STORE_APPLE_ID: numeric app id from App Store Connect (set in UI)
      node: 22 # Capacitor CLI requires Node >= 22 (installs latest 22.x)
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Generate the native iOS project (Capacitor)
        script: |
          set -ex
          # Scaffold a CLEAN iOS project if the Xcode project isn't present.
          # Keying on the .xcodeproj (not just an `ios` dir) avoids skipping
          # `cap add` when a partial/stray `ios` folder exists; rm -rf is a
          # no-op on fresh CI and clears any half-made scaffold.
          if [ ! -f ios/App/App.xcodeproj/project.pbxproj ]; then
            rm -rf ios
            npx cap add ios
          fi
          npx cap sync ios
          # Capacitor writes the Podfile to ios/App — fail loudly if it's
          # missing, so the real cause shows here instead of later at pod install.
          test -f ios/App/Podfile || { echo "ERROR: ios/App/Podfile missing after 'cap add ios'"; ls -laR ios | head -60; exit 1; }
      - name: Install CocoaPods
        script: |
          set -ex
          cd ios/App
          pod install --repo-update
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all "$(($PROJECT_BUILD_NUMBER + 1))" || true
      - name: Initialize keychain for code signing
        script: keychain initialize
      - name: Fetch or CREATE the distribution certificate + App Store profile
        # Authenticated by the codemagic_asc_api_key integration (App Manager).
        # --create makes the FIRST run create the iOS Distribution certificate
        # AND the app_store provisioning profile for app.quranlab if they don't
        # exist yet — this is what fixes "No matching profiles found".
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add the fetched certificate to the keychain
        script: keychain add-certificates
      - name: Apply the signing profile to the Xcode project
        script: xcode-project use-profiles
      - name: Build signed .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip to true once the listing (screenshots, description) is ready:
        submit_to_app_store: false
