# Cloud build & publish for the iOS app — NO Mac required.
# Codemagic runs this on its own macOS machines: it generates the native iOS
# project from Capacitor, signs it with your Apple credentials, and uploads it
# to App Store Connect / TestFlight.
#
# Before the first run (see docs/ios-app-store.md):
#   - Add an "App Store Connect" integration (API key, App Manager role) in the
#     Codemagic UI, named exactly as referenced below (codemagic_asc_api_key).
# Code signing is fully automatic via the scripts below (fetch-signing-files
# --create): the certificate + app_store profile are created on the first run.
# Nothing else to toggle in the UI.
workflows:
  ios-capacitor:
    name: iOS — Quranlab (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_asc_api_key # name of the API key added in Codemagic
    environment:
      vars:
        BUNDLE_ID: "app.quranlab"
        CAPACITOR_SERVER_URL: "https://www.quranlab.app" # your live site (canonical host)
        XCODE_PROJECT: "ios/App/App.xcodeproj" # Capacitor 8 uses SPM — no .xcworkspace
        XCODE_SCHEME: "App"
        # APP_STORE_APPLE_ID: numeric app id from App Store Connect (set in UI)
      node: 22 # Capacitor CLI requires Node >= 22 (installs latest 22.x)
      xcode: latest
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Generate the native iOS project (Capacitor)
        # Capacitor 8 uses Swift Package Manager (no Podfile / no CocoaPods);
        # SPM dependencies resolve automatically during xcodebuild. We only need
        # to scaffold + sync the project here.
        script: |
          set -ex
          # Clean scaffold if the Xcode project isn't present. Keying on the
          # .xcodeproj (not just an `ios` dir) avoids skipping `cap add` when a
          # partial/stray `ios` folder exists; rm -rf is a no-op on fresh CI.
          if [ ! -f ios/App/App.xcodeproj/project.pbxproj ]; then
            rm -rf ios
            npx cap add ios
          fi
          npx cap sync ios
      - name: Generate the app icon (Capacitor Assets)
        # ios/ is regenerated every build, so (re)generate the AppIcon from the
        # committed 1024x1024 source (quranlab-icon-1024.png) each time.
        # @capacitor/assets is a devDep installed by `npm ci`. The source is RGB
        # without alpha → the output (a single 1024 AppIcon-512@2x.png) is
        # alpha-free, as Apple requires.
        script: |
          set -ex
          mkdir -p assets
          cp quranlab-icon-1024.png assets/icon-only.png
          ./node_modules/.bin/capacitor-assets generate --ios
      - name: Declare export-compliance exemption (HTTPS/TLS only)
        # ios/ is regenerated every build, so inject the key here (after scaffold,
        # before build-ipa). The app only uses standard HTTPS/TLS → exempt, so
        # ITSAppUsesNonExemptEncryption=false stops App Store Connect ever asking
        # the Export Compliance question on TestFlight/submission.
        # Idempotent: Set if the key exists, otherwise Add it.
        script: |
          set -ex
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all "$(($PROJECT_BUILD_NUMBER + 1))" || true
      - name: Initialize keychain for code signing
        script: keychain initialize
      - name: Fetch or CREATE the distribution certificate + App Store profile
        # Authenticated by the codemagic_asc_api_key integration (App Manager).
        # A PRIVATE KEY is required to save a newly-created distribution cert
        # (otherwise: "Cannot save Signing Certificates without certificate
        # private key"). We reuse $CERTIFICATE_PRIVATE_KEY when it's set as a
        # Codemagic secret — the SAME cert is then reused on every build, so
        # Apple's 2-distribution-certificate limit is never hit. If it's not set,
        # we generate a key for this run (the build works, but set the secret
        # afterwards for sustainable reuse — see docs/ios-app-store.md).
        # --create reuses a cert matching this key, or creates one from it.
        script: |
          set -ex
          KEY=/tmp/cert_private_key.pem
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            printf '%s' "$CERTIFICATE_PRIVATE_KEY" > "$KEY"
          else
            echo "CERTIFICATE_PRIVATE_KEY not set — generating an ephemeral key for this run."
            openssl genrsa -out "$KEY" 2048
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$KEY" \
            --create
      - name: Add the fetched certificate to the keychain
        script: keychain add-certificates
      - name: Apply the signing profile to the Xcode project
        script: xcode-project use-profiles
      - name: Build signed .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip to true once the listing (screenshots, description) is ready:
        submit_to_app_store: false

  # ─────────────────────────────────────────────────────────────────────────
  # Native SwiftUI app (separate from the Capacitor one above).
  # Bundle id app.quranlab.native so it can be TestFlight-tested IN PARALLEL
  # without disturbing the current app.quranlab. The Xcode project is generated
  # from native-ios/project.yml by XcodeGen (no .xcodeproj committed, no Mac
  # needed locally). Same signing approach as the Capacitor workflow.
  # ─────────────────────────────────────────────────────────────────────────
  ios-native:
    name: iOS — Quranlab (Native SwiftUI, MVP)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_asc_api_key
    environment:
      groups:
        - Apple          # exposes CERTIFICATE_PRIVATE_KEY to the build
      vars:
        BUNDLE_ID: "app.quranlab.native"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate the Xcode project (XcodeGen)
        script: |
          set -ex
          cd native-ios
          xcodegen generate
      - name: Set build number
        script: |
          set -ex
          cd native-ios
          agvtool new-version -all "$(($PROJECT_BUILD_NUMBER + 1))" || true
      - name: Set up signing (certificate + App Store profile)
        # Same robust signing as the Capacitor workflow (see comments there).
        script: |
          set -ex
          keychain initialize
          KEY=/tmp/cert_private_key.pem
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            # Accept raw PEM or base64-encoded PEM. Base64 avoids the newline
            # mangling that CI env-var fields do to multi-line keys (the usual
            # cause of "Provided value ... is not valid").
            if printf '%s' "$CERTIFICATE_PRIVATE_KEY" | grep -q "BEGIN"; then
              printf '%s' "$CERTIFICATE_PRIVATE_KEY" > "$KEY"
            else
              printf '%s' "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > "$KEY"
            fi
          else
            echo "CERTIFICATE_PRIVATE_KEY not set — generating an ephemeral key for this run."
            openssl genrsa -out "$KEY" 2048
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$KEY" \
            --create
          keychain add-certificates
          cd native-ios && xcode-project use-profiles
      - name: Build signed .ipa
        script: |
          set -ex
          cd native-ios
          xcode-project build-ipa \
            --project "Quranlab.xcodeproj" \
            --scheme "Quranlab"
    artifacts:
      - native-ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ─────────────────────────────────────────────────────────────────────────
  # Compile-only check for the Native SwiftUI app — NO signing, NO TestFlight.
  # Cheap/fast way to surface Swift compile errors before a real signed build.
  # Generates the project with XcodeGen and builds for the iOS Simulator.
  # ─────────────────────────────────────────────────────────────────────────
  ios-native-check:
    name: iOS — Quranlab Native (compile check, no publish)
    instance_type: mac_mini_m2
    max_build_duration: 45
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: native-ios-swift-rebuild
          include: true
          source: true
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate the Xcode project (XcodeGen)
        script: |
          set -ex
          cd native-ios
          xcodegen generate
      - name: Compile (Simulator, no code signing)
        script: |
          set -ex
          cd native-ios
          xcodebuild \
            -project Quranlab.xcodeproj \
            -scheme Quranlab \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log
