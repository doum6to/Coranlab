# Cloud build & publish for the iOS app — NO Mac required.
# Codemagic runs this on its own macOS machines: it generates the native iOS
# project from Capacitor, signs it with your Apple credentials, and uploads it
# to App Store Connect / TestFlight.
#
# Before the first run, set these up in the Codemagic UI (see docs/ios-app-store.md):
#   - An "App Store Connect" integration (API key) named below.
#   - iOS code signing = "Automatic" with your bundle id.
#   - The CAPACITOR_SERVER_URL var = your production site URL.
workflows:
  ios-capacitor:
    name: iOS — Quranlab (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_asc_api_key # name of the API key added in Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.quranlab # must match capacitor.config.ts appId
      vars:
        BUNDLE_ID: "app.quranlab"
        CAPACITOR_SERVER_URL: "https://quranlab.app" # your live site
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # APP_STORE_APPLE_ID: numeric app id from App Store Connect (set in UI)
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Generate / sync the iOS project from Capacitor
        script: |
          [ -d ios ] || npx cap add ios
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all "$(($PROJECT_BUILD_NUMBER + 1))" || true
      - name: Apply automatic signing profiles
        script: xcode-project use-profiles
      - name: Build signed .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Flip to true once the listing (screenshots, description) is ready:
        submit_to_app_store: false
