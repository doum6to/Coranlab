<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Quranlab</title>
    <style>
      html, body { margin: 0; height: 100%; background: #FAF8F3; }
      .wrap {
        height: 100%; display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, system-ui, sans-serif; color: #171717;
      }
      .dot {
        width: 14px; height: 14px; border-radius: 50%; background: #6967fb;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .3; transform: scale(.8) } 50% { opacity: 1; transform: scale(1) } }
    </style>
  </head>
  <body>
    <!-- Fallback shown only if the live site can't be reached. -->
    <div class="wrap"><div class="dot"></div></div>
  </body>
</html>
