name: Quranlab
options:
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Manual
targets:
  Quranlab:
    type: application
    platform: iOS
    sources:
      - Quranlab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quranlab.native
        INFOPLIST_FILE: Quranlab/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
schemes:
  Quranlab:
    build:
      targets:
        Quranlab: all
    run:
      config: Debug
    archive:
      config: Release
